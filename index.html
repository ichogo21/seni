    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>

<body class="bg-[#0b0c10] text-gray-200 min-h-screen flex flex-col items-center py-10 px-4 selection:bg-purple-500 selection:text-white">

        <div class="text-center space-y-4">

                    <i class="fa-solid fa-user-astronaut text-3xl text-purple-400"></i>
                </div>
            </div>
            
            <!-- Nama & Judul -->
            <div>
                <h1 class="text-3xl font-bold tracking-wide bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">JUAN</h1>

            </div>
            
            <!-- Ikon Media Sosial Aktif -->
            <div class="flex justify-center space-x-6 text-2xl pt-2">
                <a href="https://www.tiktok.com/@kageyoru.id?_r=1&_t=ZS-97zrux4PBLw" target="_blank" class="hover:text-purple-400 transition-colors duration-300"><i class="fa-brands fa-tiktok"></i></a>
                <a href="https://youtube.com/@kageyoru20?si=zHH7EmvOD1iSeFWe" target="_blank" class="hover:text-red-500 transition-colors duration-300"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://www.instagram.com/kage_official20?igsh=Nml5M3RiZm1sN2oy&utm_source=qr" target="_blank" class="hover:text-pink-500 transition-colors duration-300"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://github.com/ichogo21" target="_blank" class="hover:text-blue-400 transition-colors duration-300"><i class="fa-brands fa-github"></i></a>
                <!-- Link Website AI Tools Terupdate -->
                <a href="http://ai-tools-directory-h-a00a.bolt.host/%23about" target="_blank" class="hover:text-green-400 transition-colors duration-300" title="AI Tools Directory"><i class="fa-solid fa-globe"></i></a>
            </div>
        </div>

        <hr class="border-gray-800 my-4">

        <!-- INTERACTIVE WIDGET: ENGAGEMENT CALCULATOR -->
        <div class="bg-[#12141c] border border-gray-800 p-5 rounded-2xl shadow-xl space-y-4">
            <h3 class="text-sm font-semibold tracking-wider text-purple-400 uppercase flex items-center gap-2">
                <i class="fa-solid fa-chart-simple"></i> Engagement Calculator
            </h3>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Followers</label>
                    <input id="followers" type="number" placeholder="10000" class="w-full bg-[#1f2833] border border-gray-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-purple-500 transition">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Avg. Views</label>
                    <input id="views" type="number" placeholder="2500" class="w-full bg-[#1f2833] border border-gray-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-purple-500 transition">
                </div>
            </div>
            <button onclick="hitungRate()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-medium py-2.5 rounded-xl text-sm transition shadow-lg shadow-purple-600/20 active:scale-98">Hitung Rate</button>
            <div id="resultBox" class="hidden text-center bg-[#1f2833]/50 p-3 rounded-xl border border-purple-900/30">
                <p class="text-xs text-gray-400">Engagement Rate Kamu:</p>
                <p id="rateResult" class="text-2xl font-bold text-green-400 mt-0.5">0%</p>
            </div>
        </div>

        <!-- MINI GAME: AI TRIVIA GAME -->
        <div class="bg-[#12141c] border border-gray-800 p-5 rounded-2xl shadow-xl text-center space-y-4">
            <h3 class="text-sm font-semibold tracking-wider text-blue-400 uppercase flex items-center justify-center gap-2">
                <i class="fa-solid fa-brain"></i> AI Trivia Game
            </h3>
            <p id="gameQuestion" class="text-sm text-gray-300 font-light min-h-[40px]">"Teknologi AI yang meniru cara kerja jaringan saraf otak manusia disebut apa?"</p>
            <div id="answerBox" class="hidden font-semibold text-purple-400 text-lg bg-[#1f2833] py-2 rounded-xl border border-gray-700">
                Neural Network!
            </div>
            <button id="gameBtn" onclick="revealAnswer()" class="text-xs text-gray-400 hover:text-white underline transition">Klik untuk Lihat Jawaban</button>
        </div>

        <!-- LIST LINK PENTING -->
        <div class="space-y-3">
            <h3 class="text-xs font-semibold tracking-wider text-gray-500 uppercase px-2">Link Penting</h3>
            
            <!-- Menu Telegram -->
            <a href="https://t.me/+YVnExO7YFuQ0ZDll" target="_blank" class="group flex items-center justify-between bg-[#12141c] border border-gray-800 hover:border-blue-500/50 p-4 rounded-xl transition-all duration-300 hover:-translate-y-0.5 shadow-md">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-blue-500/10 rounded-lg flex items-center justify-center text-blue-400 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                        <i class="fa-brands fa-telegram text-lg"></i>
                    </div>
                    <span class="font-medium text-sm">Join My Telegram Group</span>
                </div>
                <i class="fa-solid fa-chevron-right text-xs text-gray-600 group-hover:text-blue-400 transition-colors"></i>
            </a>

            <!-- Menu Email Bisnis Aktif -->
            <a href="mailto:kokorangga20@gmail.com?subject=Inquiry%20Kerjasama%20Bisnis" class="group flex items-center justify-between bg-[#12141c] border border-gray-800 hover:border-purple-500/50 p-4 rounded-xl transition-all duration-300 hover:-translate-y-0.5 shadow-md">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-purple-500/10 rounded-lg flex items-center justify-center text-purple-400 group-hover:bg-purple-500 group-hover:text-white transition-colors">
                        <i class="fa-solid fa-envelope text-lg"></i>
                    </div>
                    <span class="font-medium text-sm">Kerjasama Bisnis / Email</span>
                </div>
                <i class="fa-solid fa-chevron-right text-xs text-gray-600 group-hover:text-purple-400 transition-colors"></i>
            </a>
        </div>

        <!-- FOOTER -->
        <p class="text-center text-[10px] text-gray-600 pt-6">Created with AI &bull; Project Seni &copy; 2026</p>
    </div>

    <!-- LOGIKANYA (JAVASCRIPT) -->
    <script>
        function hitungRate() {
            const followers = parseFloat(document.getElementById('followers').value);
            const views = parseFloat(document.getElementById('views').value);
            const resultBox = document.getElementById('resultBox');
            const rateResult = document.getElementById('rateResult');
            
            if (followers > 0 && views > 0) {
                const rate = ((views / followers) * 100).toFixed(2);
                rateResult.innerText = rate + "%";
                resultBox.classList.remove('hidden');
            } else {
                alert('Silakan masukkan angka followers dan views yang valid!');
            }
        }

        const trivia = [
            { q: '"Teknologi AI yang meniru cara kerja jaringan saraf otak manusia disebut apa?"', a: "Neural Network!" },
            { q: '"Model AI yang bisa bikin gambar dari teks (seperti Midjourney) termasuk jenis AI apa?"', a: "Generative AI!" },
            { q: '"Apa kepanjangan dari huruf G pada GPT di ChatGPT?"', a: "Generative!" }
        ];
        let currentLevel = 0;

        function revealAnswer() {
            const answerBox = document.getElementById('answerBox');
            const gameBtn = document.getElementById('gameBtn');
            const gameQuestion = document.getElementById('gameQuestion');

            if (answerBox.classList.contains('hidden')) {
                answerBox.innerText = trivia[currentLevel].a;
                answerBox.classList.remove('hidden');
                gameBtn.innerText = "Lanjut ke Pertanyaan Berikutnya";
            } else {
                answerBox.classList.add('hidden');
                currentLevel = (currentLevel + 1) % trivia.length;
                gameQuestion.innerText = trivia[currentLevel].q;
                gameBtn.innerText = "Klik untuk Lihat Jawaban";
            }
        }
    </script>
</body>
</html>
